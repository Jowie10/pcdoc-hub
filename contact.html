</head>
<body>
    <!-- Loading Spinner -->
    <div class="loader-wrapper" id="loader">
        <div class="loader"></div>
    </div>

    <!-- Scroll Progress Bar -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="logo.png" alt="PCDOC HUB Logo" class="logo-image">
                <span class="logo-text">PCDOC HUB</span>

            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="page-header-content">
            <h1>Contact Us</h1>
            <p>Get in touch with us</p>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-info-box">
                <h2>Get In Touch</h2>
                <p><i class="fas fa-map-marker-alt"></i> Suncity Arcade, Kampala Road</p>
                <p><i class="fas fa-phone"></i> +256 704210089</p>
                <p><i class="fas fa-phone"></i> +256 779832156</p>
                <p><i class="fas fa-envelope"></i> plwalanda@outlook.com</p>
                <div class="contact-social">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
            <div class="contact-form">
                <h2>Send Message</h2>
                <form id="contactForm">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <input type="text" placeholder="Subject">
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Map Section -->
    <section class="map-section">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.753623182428!2d32.5825!3d0.3136!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMMKwMTgnNDkuMCJOIDMywrAzNCc1Ny4wIkU!5e0!3m2!1sen!2sug!4v1234567890" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <!-- Footer -->
    <footer>
        <!-- same footer -->
    </footer>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>
    <!-- WhatsApp Button -->
<a href="https://wa.me/256704210089?text=Hello%20PCDOC%20HUB%2C%20I'm%20interested%20in%20your%20products"
